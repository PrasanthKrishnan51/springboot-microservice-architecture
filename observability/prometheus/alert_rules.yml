groups:
  - name: ecommerce_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels: { severity: critical }
        annotations:
          summary: "{{ $labels.job }} is DOWN"

      - alert: HighErrorRate
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "5xx rate > 5% on {{ $labels.job }}"

      - alert: SlowP95
        expr: |
          histogram_quantile(0.95,
            rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "P95 latency > 2s on {{ $labels.job }}"

      - alert: JvmHeapHigh
        expr: |
          jvm_memory_used_bytes{area="heap"}
          / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "JVM heap > 85% on {{ $labels.job }}"

      - alert: KafkaLag
        expr: kafka_consumer_group_lag > 1000
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Kafka consumer lag on {{ $labels.topic }}"
