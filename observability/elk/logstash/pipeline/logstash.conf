# ── Input ───────────────────────────────────────────────────────────────────
input {
  tcp {
    port  => 5000
    codec => json_lines {
      charset => "UTF-8"
    }
  }
  udp {
    port  => 5000
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

# ── Filter ───────────────────────────────────────────────────────────────────
filter {
  # Route to per-service index from the 'service' field added by LogstashEncoder
  if [service] {
    mutate { add_field => { "[@metadata][index_prefix]" => "%{service}" } }
  } else {
    mutate { add_field => { "[@metadata][index_prefix]" => "unknown" } }
  }

  # Parse @timestamp
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Tag error / warn lines for alerting dashboards
  if [level] in ["ERROR", "WARN"] {
    mutate { add_tag => ["alert"] }
  }

  # Drop actuator health-check noise
  if [requestUri] =~ /\/actuator\/health/ {
    drop {}
  }

  # Promote stack_trace to structured field
  if [stack_trace] {
    mutate { rename => { "stack_trace" => "[exception][stacktrace]" } }
  }

  # Default env tag
  if ![env] {
    mutate { add_field => { "env" => "unknown" } }
  }

  # Latency bucket from durationMs (if present)
  if [durationMs] {
    ruby {
      code => "
        ms = event.get('durationMs').to_f
        bucket = ms < 100 ? 'fast' : ms < 500 ? 'medium' : ms < 2000 ? 'slow' : 'very_slow'
        event.set('latency_bucket', bucket)
      "
    }
  }
}

# ── Output ───────────────────────────────────────────────────────────────────
output {
  elasticsearch {
    hosts    => ["${ELASTICSEARCH_HOST:elasticsearch}:9200"]
    index    => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    user     => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
    ssl_enabled => false
    action   => "index"
  }
}
