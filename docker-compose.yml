version: '3.8'

networks:
  ecommerce-net:
    driver: bridge

volumes:
  mongo-data:
  elasticsearch-data:
  grafana-data:
  prometheus-data:
  redis-data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongo-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks: [ecommerce-net]
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports: ["6379:6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    volumes: [redis-data:/data]
    networks: [ecommerce-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [ecommerce-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks: [ecommerce-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports: ["9093:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
    networks: [ecommerce-net]

  eureka:
    image: steeltoeoss/eureka-server:latest
    container_name: eureka
    restart: unless-stopped
    ports: ["8761:8761"]
    networks: [ecommerce-net]
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── ELK ─────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports: ["9200:9200"]
    volumes: [elasticsearch-data:/usr/share/elasticsearch/data]
    networks: [ecommerce-net]
    healthcheck:
      test: ["CMD-SHELL","curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    restart: unless-stopped
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./observability/elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./observability/elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx1g"
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-changeme}
    depends_on:
      elasticsearch: { condition: service_healthy }
    networks: [ecommerce-net]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    ports: ["5601:5601"]
    volumes:
      - ./observability/elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch: { condition: service_healthy }
    networks: [ecommerce-net]

  # ── Observability ─────────────────────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.0
    container_name: zipkin
    restart: unless-stopped
    ports: ["9411:9411"]
    networks: [ecommerce-net]

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=15d'
    networks: [ecommerce-net]

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [ecommerce-net]

  # ── Application Services ──────────────────────────────────────────────────────
  api-gateway:
    build: { context: ./api-gateway, dockerfile: Dockerfile }
    container_name: api-gateway
    restart: unless-stopped
    ports: ["8080:8080"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_HOST: eureka
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET}
      ZIPKIN_HOST: zipkin
      LOGSTASH_HOST: logstash
    depends_on:
      eureka: { condition: service_healthy }
    networks: [ecommerce-net]

  user-service:
    build: { context: ./user-service, dockerfile: Dockerfile }
    container_name: user-service
    restart: unless-stopped
    ports: ["8081:8081"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-password}@mongodb:27017/user_db?authSource=admin
      EUREKA_HOST: eureka
      JWT_SECRET: ${JWT_SECRET}
      ZIPKIN_HOST: zipkin
      LOGSTASH_HOST: logstash
    depends_on:
      mongodb: { condition: service_healthy }
      eureka:  { condition: service_healthy }
    networks: [ecommerce-net]

  product-service:
    build: { context: ./product-service, dockerfile: Dockerfile }
    container_name: product-service
    restart: unless-stopped
    ports: ["8082:8082"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-password}@mongodb:27017/product_db?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: eureka
      ZIPKIN_HOST: zipkin
      LOGSTASH_HOST: logstash
    depends_on:
      mongodb: { condition: service_healthy }
      kafka:   { condition: service_started }
      eureka:  { condition: service_healthy }
    networks: [ecommerce-net]

  order-service:
    build: { context: ./order-service, dockerfile: Dockerfile }
    container_name: order-service
    restart: unless-stopped
    ports: ["8083:8083"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-password}@mongodb:27017/order_db?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_HOST: eureka
      ZIPKIN_HOST: zipkin
      LOGSTASH_HOST: logstash
    depends_on:
      mongodb: { condition: service_healthy }
      kafka:   { condition: service_started }
      eureka:  { condition: service_healthy }
    networks: [ecommerce-net]
